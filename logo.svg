<svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="120" fill="white" rx="10"/>
  
  <!-- Main Text: TriLingua -->
  <text x="20" y="65" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#2c3e50">
    TriLingua
  </text>
  
  <!-- Superscript 3 -->
  <text x="240" y="45" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#3498db">
    3
  </text>
  
  <!-- Subtitle: Business Partners -->
  <text x="20" y="95" font-family="Arial, sans-serif" font-size="18" font-weight="normal" fill="#7f8c8d" letter-spacing="2">
    BUSINESS PARTNERS
  </text>
  
  <!-- Flag icons -->
  <circle cx="340" cy="35" r="15" fill="#009b3a"/>
  <text x="340" y="40" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffdf00" text-anchor="middle">PT</text>
  
  <circle cx="370" cy="35" r="15" fill="#012169"/>
  <text x="370" y="40" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">EN</text>
  
  <circle cx="340" cy="65" r="15" fill="#ae1c28"/>
  <text x="340" y="70" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">NL</text>
  
  <!-- Tagline -->
  <text x="370" cy="85" font-family="Arial, sans-serif" font-size="10" font-weight="normal" fill="#95a5a6" text-anchor="middle">
    3 Languages
  </text>
</svg>