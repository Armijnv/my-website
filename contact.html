<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact - Trusted Hosts</title>

  <style>
    html, body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1f2e;
      color: white;
      overflow-x: hidden;
    }

    header {
      position: fixed;
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 20px 40px 20px 40px;
      margin: 0;
      z-index: 10;
      box-sizing: border-box;
      background: #1a1f2e;
      border-bottom: 1px solid #2a2f3e;
    }

    header h1 {
      font-size: 18px;
      font-weight: 500;
    }

    .logo {
      height: 120px;
      width: auto;
      display: block;
      margin: 0;
    }

    header a {
      color: #aaa;
      text-decoration: none;
      margin-left: 20px;
    }

    header a:hover {
      color: #fff;
    }

    main {
      margin-top: 140px;
      padding: 40px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }

    h2 {
      font-size: 42px;
      font-weight: 500;
      margin-bottom: 20px;
    }

    p {
      color: #aaa;
      font-size: 16px;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    form {
      display: flex;
      flex-direction: column;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 500;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #2a2f3e;
      border-radius: 4px;
      background: #0f1115;
      color: white;
      font-family: inherit;
      font-size: 14px;
      box-sizing: border-box;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: #aaa;
      background: #141820;
    }

    textarea {
      resize: vertical;
      min-height: 120px;
    }

    .btn {
      margin-top: 20px;
      display: inline-block;
      background: white;
      color: black;
      padding: 12px 20px;
      text-decoration: none;
      border-radius: 4px;
      font-size: 14px;
      border: none;
      cursor: pointer;
      font-weight: 500;
    }

    .btn:hover {
      background: #f0f0f0;
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    [data-fs-success] {
      display: none;
      padding: 15px;
      background: #2a5f3a;
      border: 1px solid #3a7f4a;
      border-radius: 4px;
      margin-bottom: 20px;
      color: #90ee90;
    }

    [data-fs-success].show {
      display: block;
    }

    [data-fs-error] {
      display: none;
      padding: 15px;
      background: #5f2a2a;
      border: 1px solid #7f3a3a;
      border-radius: 4px;
      margin-bottom: 20px;
      color: #ff6b6b;
    }

    [data-fs-error].show {
      display: block;
    }

    span[data-fs-error] {
      display: none;
      font-size: 12px;
      color: #ff6b6b;
      margin-top: 4px;
    }

    span[data-fs-error].show {
      display: block;
    }
  </style>
</head>

<body>

<header>
  <img src="images/logo.jpeg" alt="Trusted Hosts" class="logo">
  <nav>
    <a href="index.html">Home</a>
    <a href="#">Join</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<main>
  <h2>Get in Touch</h2>
  <p>Have questions or want to learn more about Trusted Hosts? We'd love to hear from you. Send us a message and we'll get back to you as soon as possible.</p>

  <div data-fs-success>
    Thank you! Your message has been sent successfully. We'll get back to you soon.
  </div>
  <div data-fs-error></div>

  <form id="contact-form">
    <div class="form-group">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" data-fs-field required>
      <span data-fs-error="name"></span>
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" data-fs-field required>
      <span data-fs-error="email"></span>
    </div>

    <div class="form-group">
      <label for="subject">Subject</label>
      <input type="text" id="subject" name="subject" data-fs-field required>
      <span data-fs-error="subject"></span>
    </div>

    <div class="form-group">
      <label for="message">Message</label>
      <textarea id="message" name="message" data-fs-field required></textarea>
      <span data-fs-error="message"></span>
    </div>

    <button type="submit" class="btn" data-fs-submit-btn>Send Message</button>
  </form>
</main>

<script>
  window.formspree = window.formspree || function () { (formspree.q = formspree.q || []).push(arguments); };
  formspree('initForm', { formElement: '#contact-form', formId: 'mgoranga' });
</script>
<script src="https://unpkg.com/@formspree/ajax@1" defer></script>

</body>
</html>
