<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact - Trusted Hosts</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <a href="index.html">
    <img src="images/logo.jpeg" alt="Trusted Hosts" class="logo">
  </a>

  <nav class="nav">
  <div class="menu-toggle">☰</div>

  <div class="menu">
    <a href="index.html">Home</a>
    <a href="host.html?id=1.html">Host</a>
    <a href="https://wa.me/+5551997783369" target="_blank">WhatsApp</a>
    <a href="https://instagram.com/hosttrusted" target="_blank">Instagram</a>
  </div>
</nav>
</header>
<main>
  <h2>Get in Touch</h2>
  <p>Have questions or want to learn more about Trusted Hosts? We'd love to hear from you. Send us a message and we'll get back to you as soon as possible.</p>

  <div data-fs-success>
    Thank you! Your message has been sent successfully. We'll get back to you soon.
  </div>
  <div data-fs-error></div>

  <form id="contact-form">
    <div class="form-group">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" data-fs-field required>
      <span data-fs-error="name"></span>
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" data-fs-field required>
      <span data-fs-error="email"></span>
    </div>

    <div class="form-group">
      <label for="subject">Subject</label>
      <input type="text" id="subject" name="subject" data-fs-field required>
      <span data-fs-error="subject"></span>
    </div>

    <div class="form-group">
      <label for="message">Message</label>
      <textarea id="message" name="message" data-fs-field required></textarea>
      <span data-fs-error="message"></span>
    </div>

    <button type="submit" class="btn" data-fs-submit-btn>Send Message</button>
  </form>
</main>

<script>
  window.formspree = window.formspree || function () { (formspree.q = formspree.q || []).push(arguments); };
  formspree('initForm', { formElement: '#contact-form', formId: 'mgoranga' });
</script>
<script src="https://unpkg.com/@formspree/ajax@1" defer></script>

</body>
</html>
