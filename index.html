      }
    }

    .menu a i {
      font-size: 20px;
    }

    .menu a {
      display: flex;
      align-items: center;
    }

  <script type="application/ld+json">

      "https://wa.me/+5551997783369"

  }
  </script>

<body>

<header>

  <nav>

<a href="https://instagram.com/hosttrusted" target="_blank">
  <i class="fa-brands fa-instagram"></i>
</a>
  </div>
</nav>
</header>

<div class="overlay">
  <h1 style="font-size: 42px; font-weight: 500; margin: 0;">Trusted people.<br>On the ground.</h1>
  <p>
    Local business support for international visitors in Porto Alegre, Brazil — meetings, logistics, communication and accommodation.
  </p>
  <a class="btn" href="hosts.html">Find a Host in Porto Alegre</a>
</div>

<div id="globeViz"></div>

<script>
  const hosts = [
    {
      id: 1,
      lat: -30.0346,
      lng: -51.2177,
      name: "Porto Alegre Host",
      description: "Business support & local assistance"
    }
  ];

  const globe = Globe()
    (document.getElementById('globeViz'))
    .globeImageUrl('//unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
    .backgroundColor('#1a1f2e')
    .atmosphereColor('#3a7bd5')
.atmosphereAltitude(0.25)

    // ✅ BIGGER + MOBILE-FRIENDLY POINTS
    .pointsData(hosts)
    .pointLat(d => d.lat)
    .pointLng(d => d.lng)
    .pointAltitude(0.08)
    .pointRadius(2.5)
    .pointResolution(20)
    .pointColor(() => '#ffffff')

    // ✅ ADD LABEL (EASY TAP TARGET)
    .labelsData(hosts)
    .labelLat(d => d.lat)
    .labelLng(d => d.lng)
    .labelText(() => "●")
    .labelSize(1.5)
    .labelColor(() => '#ffffff')

    // ✅ CLICK ACTION (BOTH WORK)
    .onPointClick(d => {
      window.location.href = `/porto-alegre/`;
    })
    .onLabelClick(d => {
      window.location.href = `/porto-alegre/`;
    })

    // ✅ GLOW RING
    .ringsData(hosts)
    .ringLat(d => d.lat)
    .ringLng(d => d.lng)
    .ringMaxRadius(6)
    .ringPropagationSpeed(1.2)
    .ringRepeatPeriod(1200);

  // ✅ SPINNING
  globe.controls().autoRotate = true;
  globe.controls().autoRotateSpeed = 0.2;

  // ✅ START POSITION
  globe.pointOfView({ lat: -30, lng: -51, altitude: 2 }, 2000);
const globeEl = document.getElementById('globeViz');

globeEl.addEventListener('mouseenter', () => {
  globe.controls().autoRotate = false;
});

globeEl.addEventListener('mouseleave', () => {
  globe.controls().autoRotate = true;
});

</script>
<script>
  const toggle = document.querySelector('.menu-toggle');
  const menu = document.querySelector('.menu');

  toggle.addEventListener('click', () => {
    menu.classList.toggle('active');
  });
</script>
</body>
</html>
