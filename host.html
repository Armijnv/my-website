<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Trusted Host</title>

 <link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<header>
  <a href="index.html">
    <img src="images/logo.jpeg" alt="Trusted Hosts" class="logo">
  </a>

  <nav class="nav">
  <div class="menu-toggle">☰</div>

  <div class="menu">
    <a href="index.html">Home</a>
    <a href="contact.html">Contact</a>
    <a href="https://wa.me/+5551997783369" target="_blank">
  <i class="fa-brands fa-whatsapp"></i>
</a>

<a href="https://instagram.com/hosttrusted" target="_blank">
  <i class="fa-brands fa-instagram"></i>
</a>
  </div>
</nav>
</header>

<main class="container">

  <div class="top">
    <img id="avatar" class="avatar" alt="Host profile"/>
    <div>
      <h1 id="name"></h1>
      <div class="subtitle" id="location"></div>

      <div class="verified">
        ✔ Verified Trusted Host
      </div>

      <div class="stats">
        <div id="rating"></div>
        <div id="jobs"></div>
        <div id="response"></div>
      </div>
    </div>
  </div>

  <div class="grid">

    <div>

      <div class="card">
        <h3>About</h3>
        <p id="about"></p>
      </div>

      <div class="card">
        <h3>Services</h3>
        <p id="services"></p>
      </div>

      <div class="card">
        <h3>Reviews</h3>

        <div class="review">
          “Very professional and reliable. Made our visit smooth and efficient.”
        </div>

        <div class="review">
          “Excellent support during meetings and logistics. Highly recommended.”
        </div>

      </div>

    </div>

    <div class="cta-box">
      <div class="price" id="price"></div>

      <a id="contactBtn" class="btn" href="#">Request Contact</a>

      <div class="small">
        Usually responds within a few hours
      </div>
    </div>

  </div>

</main>

<script>
  const data = {
    1: {
      name: "Armijn",
      location: "Porto Alegre, Brazil",
      avatar: "images/me3.png",
      about: "I support international business visitors with meetings, logistics, and local coordination. My goal is to make your time efficient and stress-free.",
      services: "Business meetings, site visits, transport, logistics, communication",
      price: "From $200 / day",
      rating: "⭐ 5.0",
      jobs: "32 visits completed",
      response: "Responds quickly",
      email: "armijnvandijk@gmail.com"
    }
  };

  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");

  const host = data[id];

  if (host) {
    document.getElementById("name").innerText = host.name;
    document.getElementById("location").innerText = host.location;
    document.getElementById("avatar").src = host.avatar || "images/default.png";
    document.getElementById("about").innerText = host.about;
    document.getElementById("services").innerText = host.services;
    document.getElementById("price").innerText = host.price;
    document.getElementById("rating").innerText = host.rating;
    document.getElementById("jobs").innerText = host.jobs;
    document.getElementById("response").innerText = host.response;
    document.getElementById("contactBtn").href = `mailto:${host.email}`;
  }
  if (!host) {
    document.body.innerHTML = "<h2 style='padding:40px;'>Host not found</h2>";
  }
</script>
<script>
  const toggle = document.querySelector('.menu-toggle');
  const menu = document.querySelector('.menu');

  toggle.addEventListener('click', () => {
    menu.classList.toggle('active');
  });
<footer class="footer">
  <div class="footer-content">
    <p>© 2026 Trusted Hosts</p>

    <div class="footer-links">
      <a href="index.html">Home</a>
      <a href="contact.html">Contact</a>

      <a href="https://wa.me/+5551997783369" target="_blank">
        <i class="fa-brands fa-whatsapp"></i>
      </a>

      <a href="https://instagram.com/hosttrusted" target="_blank">
        <i class="fa-brands fa-instagram"></i>
      </a>
    </div>
  </div>
</footer>
</script>
</body>
</html>
